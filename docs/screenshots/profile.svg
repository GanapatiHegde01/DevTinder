<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DevTinder profile editor preview</title>
  <desc id="desc">A dark DevTinder profile page showing profile summary, edit form, and password form.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090c12"/>
      <stop offset="0.58" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#101016"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2736"/>
      <stop offset="1" stop-color="#101822"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="180" cy="98" r="230" fill="#2de1c2" opacity="0.1"/>
  <circle cx="1030" cy="92" r="210" fill="#ffb000" opacity="0.11"/>
  <rect x="0" y="0" width="1200" height="78" fill="#090c12" opacity="0.88"/>
  <rect x="54" y="20" width="40" height="40" rx="8" fill="#ffb000"/>
  <text x="112" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#f5f1e8">DevTinder</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">
    <text x="410" y="46" fill="#9aa7b8">Feed</text>
    <text x="508" y="46" fill="#9aa7b8">Requests</text>
    <text x="610" y="46" fill="#9aa7b8">Connections</text>
    <rect x="730" y="20" width="96" height="40" rx="8" fill="#ffb000" opacity="0.16" stroke="#ffb000" stroke-opacity="0.35"/>
    <text x="754" y="46" fill="#f5f1e8">Profile</text>
  </g>
  <g transform="translate(70 126)">
    <text x="0" y="20" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="800" fill="#ffb000">IDENTITY</text>
    <text x="0" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="46" font-weight="850" fill="#f5f1e8">Profile</text>
    <text x="0" y="108" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#9aa7b8">Tune your visible signal, skills, and profile photo.</text>
    <g transform="translate(0 154)">
      <rect width="368" height="278" rx="10" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.1"/>
      <rect x="30" y="30" width="82" height="82" rx="12" fill="#ffb000"/>
      <text x="52" y="81" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="900" fill="#090c12">GH</text>
      <text x="132" y="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="850" fill="#f5f1e8">Ganapati Hegde</text>
      <text x="132" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9aa7b8">ganapati@example.com</text>
      <text x="30" y="154" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9aa7b8">Full-stack developer building practical</text>
      <text x="30" y="180" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9aa7b8">products with React, Node, and MongoDB.</text>
      <rect x="30" y="216" width="72" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
      <rect x="114" y="216" width="78" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
      <rect x="204" y="216" width="94" height="30" rx="15" fill="#ffffff" opacity="0.06"/>
      <text x="49" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f5f1e8">React</text>
      <text x="133" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f5f1e8">Node.js</text>
      <text x="224" y="236" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f5f1e8">Express</text>
    </g>
    <g transform="translate(400 154)">
      <rect width="636" height="344" rx="10" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="30" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="850" fill="#f5f1e8">Edit profile</text>
      <g fill="#ffffff" opacity="0.075">
        <rect x="30" y="72" width="270" height="48" rx="8"/>
        <rect x="326" y="72" width="270" height="48" rx="8"/>
        <rect x="30" y="142" width="270" height="48" rx="8"/>
        <rect x="326" y="142" width="270" height="48" rx="8"/>
        <rect x="30" y="212" width="566" height="58" rx="8"/>
      </g>
      <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9aa7b8">
        <text x="48" y="102">First name</text>
        <text x="344" y="102">Last name</text>
        <text x="48" y="172">Email</text>
        <text x="344" y="172">Profile image URL</text>
        <text x="48" y="244">About</text>
      </g>
      <rect x="30" y="292" width="566" height="52" rx="8" fill="#ffb000"/>
      <text x="258" y="325" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="850" fill="#090c12">Save profile</text>
    </g>
    <g transform="translate(400 522)">
      <rect width="636" height="120" rx="10" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="30" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="850" fill="#f5f1e8">Change password</text>
      <rect x="30" y="64" width="220" height="38" rx="8" fill="#ffffff" opacity="0.075"/>
      <rect x="270" y="64" width="220" height="38" rx="8" fill="#ffffff" opacity="0.075"/>
      <rect x="510" y="64" width="96" height="38" rx="8" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
      <text x="544" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="800" fill="#f5f1e8">Update</text>
    </g>
  </g>
</svg>
