<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DevTinder authentication screen preview</title>
  <desc id="desc">A dark DevTinder signup screen with a hero message and profile creation form.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090c12"/>
      <stop offset="0.55" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#141119"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2838"/>
      <stop offset="1" stop-color="#101822"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="160" cy="92" r="210" fill="#2de1c2" opacity="0.11"/>
  <circle cx="980" cy="88" r="190" fill="#ffb000" opacity="0.12"/>
  <g transform="translate(72 86)">
    <rect x="0" y="0" width="1056" height="588" rx="22" fill="#0f1620" opacity="0.72" stroke="#ffffff" stroke-opacity="0.08"/>
    <g transform="translate(64 70)">
      <rect x="0" y="0" width="232" height="44" rx="22" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-opacity="0.1"/>
      <circle cx="25" cy="22" r="10" fill="#ffb000"/>
      <text x="46" y="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#9aa7b8">DevTinder network console</text>
      <text x="0" y="132" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#f5f1e8">Match with</text>
      <text x="0" y="202" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="64" font-weight="800" fill="#f5f1e8">builders who ship.</text>
      <text x="0" y="260" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#9aa7b8">Discover developers, review requests, and keep</text>
      <text x="0" y="290" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20" fill="#9aa7b8">your profile signal sharp.</text>
      <g transform="translate(0 346)">
        <rect width="148" height="88" rx="8" fill="#ffffff" opacity="0.055" stroke="#ffffff" stroke-opacity="0.1"/>
        <text x="22" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffb000">01</text>
        <text x="22" y="61" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#f5f1e8">Curated feed</text>
      </g>
      <g transform="translate(168 346)">
        <rect width="148" height="88" rx="8" fill="#ffffff" opacity="0.055" stroke="#ffffff" stroke-opacity="0.1"/>
        <text x="22" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffb000">02</text>
        <text x="22" y="61" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#f5f1e8">Requests</text>
      </g>
      <g transform="translate(336 346)">
        <rect width="148" height="88" rx="8" fill="#ffffff" opacity="0.055" stroke="#ffffff" stroke-opacity="0.1"/>
        <text x="22" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffb000">03</text>
        <text x="22" y="61" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#f5f1e8">Profile signal</text>
      </g>
    </g>
    <g transform="translate(650 58)" filter="url(#shadow)">
      <rect width="342" height="472" rx="12" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="28" y="56" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffb000">CREATE PROFILE</text>
      <text x="28" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#f5f1e8">Join the graph</text>
      <g transform="translate(28 126)" fill="#ffffff" opacity="0.075">
        <rect width="132" height="48" rx="8"/>
        <rect x="154" width="132" height="48" rx="8"/>
        <rect y="68" width="286" height="48" rx="8"/>
        <rect y="136" width="286" height="48" rx="8"/>
        <rect y="204" width="132" height="48" rx="8"/>
        <rect x="154" y="204" width="132" height="48" rx="8"/>
        <rect y="272" width="286" height="48" rx="8"/>
      </g>
      <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9aa7b8">
        <text x="44" y="156">First name</text>
        <text x="198" y="156">Last name</text>
        <text x="44" y="224">Email</text>
        <text x="44" y="292">Strong password</text>
        <text x="44" y="360">Age</text>
        <text x="198" y="360">Male</text>
        <text x="44" y="428">React, Node, MongoDB</text>
      </g>
      <rect x="28" y="420" width="286" height="52" rx="8" fill="#ffb000"/>
      <text x="109" y="453" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#090c12">Create account</text>
    </g>
  </g>
</svg>
