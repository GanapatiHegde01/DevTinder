      <rect x="30" y="28" width="56" height="56" rx="8" fill="#ffffff" opacity="0.08"/>
      <rect x="112" y="32" width="184" height="18" rx="9" fill="#ffffff" opacity="0.11"/>
      <rect x="112" y="64" width="286" height="14" rx="7" fill="#ffffff" opacity="0.08"/>
