      <text x="135" y="173" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f5f1e8">React</text>
      <text x="220" y="173" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f5f1e8">Design</text>
