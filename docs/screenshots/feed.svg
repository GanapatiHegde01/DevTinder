<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">DevTinder developer feed preview</title>
  <desc id="desc">A dark app dashboard showing developer feed cards with ignore and interested actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090c12"/>
      <stop offset="0.6" stop-color="#0d1420"/>
      <stop offset="1" stop-color="#101016"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2635"/>
      <stop offset="1" stop-color="#101822"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1060" cy="80" r="210" fill="#ffb000" opacity="0.11"/>
  <circle cx="180" cy="120" r="230" fill="#2de1c2" opacity="0.1"/>
  <rect x="0" y="0" width="1200" height="78" fill="#090c12" opacity="0.88"/>
  <rect x="54" y="20" width="40" height="40" rx="8" fill="#ffb000"/>
  <text x="112" y="46" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#f5f1e8">DevTinder</text>
