      <text x="124" y="84" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9aa7b8">24 yrs / Female</text>
      <text x="30" y="128" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9aa7b8">Frontend engineer crafting fast, accessible interfaces.</text>
